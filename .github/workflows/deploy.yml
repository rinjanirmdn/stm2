# =============================================================================
# CD Pipeline — Deploy to Production/Staging
# =============================================================================
# Triggered when CI passes on the main branch.
# This is a template — enable the deployment strategy you use:
#   • SSH deploy (rsync to VPS/server)
#   • Docker deploy
#   • Cloud platform (AWS, GCP, etc.)
#
# Currently configured for SSH/rsync deployment.
# Uncomment and configure the appropriate section for your setup.
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Deploy — Only runs if CI passed on main
  # ---------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, pgsql, mbstring, xml, ctype, json, bcmath, gd
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies & build assets
        run: |
          npm ci
          npm run build

      # =====================================================================
      # OPTION A: SSH/Rsync Deploy (most common for VPS/dedicated servers)
      # =====================================================================
